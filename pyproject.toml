[tool.uv.workspace]
members = ["backend"]

[dependency-groups]
dev = [
    "zizmor>=1.25.2",
]

github-actions = [
    "smokeshow>=0.5.0",
]

[tool.typos.files]
extend-exclude = [
    "sources/",
    "uv.lock",
    "backend/coverage/",
    "backend/htmlcov/",
]

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
